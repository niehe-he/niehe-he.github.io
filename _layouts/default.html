<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="bg-orbs"></div>
  <div class="site-wrap">

    <header class="site-header">
      <div class="nav-inner">
        <a href="{{ '/' | relative_url }}" class="nav-brand">{{ site.title }}</a>
        <nav>
          <ul class="nav-links">
            <li><a href="#about">About</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#blog">Blog</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>Crafted with <span class="heart">&hearts;</span> by <a href="https://github.com/{{ site.github_username }}">@{{ site.github_username }}</a></p>
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }} &mdash; Powered by Jekyll</p>
      </div>
    </footer>

  </div>

  <script>
    (function() {
      var sections = document.querySelectorAll('.section');
      if (!sections.length) return;
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) entry.target.classList.add('visible');
        });
      }, { threshold: 0.1 });
      sections.forEach(function(el) { observer.observe(el); });
    })();

    (function() {
      var el = document.getElementById('typewriter');
      if (!el) return;
      var phrases = JSON.parse(el.getAttribute('data-phrases') || '[]');
      if (!phrases.length) return;
      var i = 0, j = 0, forward = true;
      function tick() {
        if (forward) {
          if (j < phrases[i].length) { el.textContent = phrases[i].substring(0, ++j); setTimeout(tick, 80); }
          else { forward = false; setTimeout(tick, 2000); }
        } else {
          if (j > 0) { el.textContent = phrases[i].substring(0, --j); setTimeout(tick, 40); }
          else { forward = true; i = (i + 1) % phrases.length; setTimeout(tick, 300); }
        }
      }
      tick();
    })();

    (function() {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.querySelectorAll('.skill-fill').forEach(function(bar) {
              bar.style.width = bar.getAttribute('data-width');
            });
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.2 });
      var section = document.getElementById('skills');
      if (section) observer.observe(section);
    })();
  </script>
</body>
</html>
