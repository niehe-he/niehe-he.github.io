<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="bg-orbs"></div>
  <div class="site-wrap">
    {% include header.html %}
    <main>
      {{ content }}
    </main>
    {% include footer.html %}
  </div>
  <script>
    // Scroll reveal animation
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.section').forEach(el => observer.observe(el));

    // Typewriter effect
    (function() {
      const el = document.getElementById('typewriter');
      if (!el) return;
      const phrases = JSON.parse(el.dataset.phrases || '[]');
      if (!phrases.length) return;
      let i = 0, j = 0, forward = true;
      function tick() {
        if (forward) {
          if (j < phrases[i].length) { el.textContent = phrases[i].substring(0, ++j); setTimeout(tick, 80); }
          else { forward = false; setTimeout(tick, 2000); }
        } else {
          if (j > 0) { el.textContent = phrases[i].substring(0, --j); setTimeout(tick, 40); }
          else { forward = true; i = (i + 1) % phrases.length; setTimeout(tick, 300); }
        }
      }
      tick();
    })();
  </script>
</body>
</html>
