---
layout: default
---

<article class="container">
  <a href="{{ '/' | relative_url }}" class="post-back">&#8592; Back Home</a>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-date">{{ page.date | date: "%B %d, %Y" }}</div>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
